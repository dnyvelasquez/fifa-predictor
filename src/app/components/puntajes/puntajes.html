<div class="puntajes-container">
  <mat-card class="puntajes-card">
    <div class="header">
      <img 
        src="https://digitalhub.fifa.com/transform/157d23bf-7e13-4d7b-949e-5d27d340987e/WC26_Logo?&io=transform:fill,height:210&quality=75" 
        alt="FIFA Logo" 
        class="logo"
        loading="lazy"
        width="50"
        height="50">
      <mat-card-title class="puntajes-title">Puntajes</mat-card-title>
      <h1 aria-hidden="true">⚽</h1>
      <mat-divider></mat-divider>
    </div>

    <div class="button-container">
      <button class="left" mat-icon-button routerLink="/admin" aria-label="Volver">
        <mat-icon>arrow_back</mat-icon>
      </button>
      <button mat-stroked-button (click)="acumular()" [disabled]="saving">
        <mat-icon>calculate</mat-icon>
        <span>Acumular</span>
      </button>
      <button mat-stroked-button (click)="resetAcumulados()" [disabled]="saving">
        <mat-icon>restart_alt</mat-icon>
        <span>Reset acumulados</span>
      </button>
      <button mat-stroked-button (click)="resetPuntajes()" [disabled]="saving">
        <mat-icon>restart_alt</mat-icon>
        <span>Reset puntajes</span>
      </button>
      <button class="right" mat-icon-button (click)="logout()" aria-label="Logout">
        <mat-icon>logout</mat-icon>
      </button>
    </div>
    
    @if (loading) {
      <div class="loading-container">
        <mat-spinner diameter="40"></mat-spinner>
        <p>Cargando equipos...</p>
      </div>
    } @else {
      <div class="table-container">
        @for (e of equipos; track e.id) {
          <div class="puntajes-table">
            <div class="equipos">
              <div class="equipo">
                <img [src]="e.logo" [alt]="e.nombre" class="equipo-logo" loading="lazy">
                <div class="info-equipo">
                  <span>{{ e.nombre }}</span>
                  <span class="participante">{{ e.participante }}</span>
                </div>
              </div>

              <div class="info">
                <mat-form-field appearance="fill" class="score">
                  <mat-label>PG</mat-label>
                  <input type="number" matInput placeholder="0" [(ngModel)]="e.pg" />
                </mat-form-field>
                <mat-form-field appearance="fill" class="score">
                  <mat-label>PE</mat-label>
                  <input type="number" matInput placeholder="0" [(ngModel)]="e.pe" />
                </mat-form-field>
                <mat-form-field appearance="fill" class="score">
                  <mat-label>PP</mat-label>
                  <input type="number" matInput placeholder="0" [(ngModel)]="e.pp" />
                </mat-form-field>
              </div>
              <div class="info">
                <mat-form-field appearance="fill" class="score">
                  <mat-label>P32</mat-label>
                  <input type="number" matInput placeholder="0" [(ngModel)]="e.p32" />
                </mat-form-field>
                <mat-form-field appearance="fill" class="score">
                  <mat-label>PO</mat-label>
                  <input type="number" matInput placeholder="0" [(ngModel)]="e.po" />
                </mat-form-field>
                <mat-form-field appearance="fill" class="score">
                  <mat-label>PC</mat-label>
                  <input type="number" matInput placeholder="0" [(ngModel)]="e.pc" />
                </mat-form-field>
              </div>
              <div class="info">
                <mat-form-field appearance="fill" class="score">
                  <mat-label>PS</mat-label>
                  <input type="number" matInput placeholder="0" [(ngModel)]="e.ps" />
                </mat-form-field>
                <mat-form-field appearance="fill" class="score">
                  <mat-label>PF</mat-label>
                  <input type="number" matInput placeholder="0" [(ngModel)]="e.pf" />
                </mat-form-field>
              </div>
              <button class="controll" mat-icon-button (click)="guardarPuntos(e)" [disabled]="saving" aria-label="Guardar">
                <mat-icon>update</mat-icon>
              </button>
            </div>
          </div>
        } @empty {
          <div class="empty-container">
            <mat-icon>sports_soccer</mat-icon>
            <p>No hay equipos con participantes asignados</p>
          </div>
        }
      </div>
    }
  </mat-card>
</div>
