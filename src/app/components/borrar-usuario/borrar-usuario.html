<div class="borrar-container">
  <mat-card class="borrar-card">
    <div class="header">
      <img 
        src="https://digitalhub.fifa.com/transform/157d23bf-7e13-4d7b-949e-5d27d340987e/WC26_Logo?&io=transform:fill,height:210&quality=75" 
        alt="FIFA Logo" 
        class="logo"
        loading="lazy"
        width="50"
        height="50">
      <h1>Borrar Usuario</h1>
      <h1 aria-hidden="true">⚽</h1>
      <mat-divider></mat-divider>
    </div>

    <div class="button-container">
      <button class="left" mat-icon-button routerLink="/admin" aria-label="Volver">
        <mat-icon>arrow_back</mat-icon>
      </button>
      <button class="right" mat-icon-button (click)="logout()" aria-label="Logout">
        <mat-icon>logout</mat-icon>
      </button>
    </div>

    <div class="search-container">
      <mat-form-field appearance="fill" class="search-field">
        <mat-label>Buscar (email)</mat-label>
        <input matInput [formControl]="search" placeholder="Escribe el email..." />
        <mat-icon matSuffix>search</mat-icon>
      </mat-form-field>
      <button mat-raised-button color="primary" (click)="doSearch()" [disabled]="loading">
        Buscar
      </button>
    </div>

    <!-- Loading Spinner -->
    @if (loading) {
      <div class="loading-container">
        <mat-spinner diameter="40"></mat-spinner>
        <p>Cargando usuarios...</p>
      </div>
    }

    @if (!loading) {
      <div class="users-table">
        <table class="borrar-table">
          <thead>
            <tr>
              <th>Email</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody>
            @for (u of users; track u.id) {
              <tr [class.deleting]="deleting">
                <td class="email-cell">{{ u.email }}</td>
                <td class="actions-cell">
                  <button mat-icon-button color="warn" (click)="confirmAndDelete(u)" [disabled]="deleting" aria-label="Eliminar">
                    <mat-icon>delete</mat-icon>
                  </button>
                </td>
              </tr>
            } @empty {
              <tr>
                <td colspan="2" class="empty-cell">
                  <mat-icon>people_outline</mat-icon>
                  <p>No se encontraron usuarios</p>
                </td>
              </tr>
            }
          </tbody>
        </table>
      </div>

      @if (users.length > 0) {
        <div class="pagination">
          <button mat-stroked-button (click)="prevPage()" [disabled]="page <= 1 || loading">
            <mat-icon>chevron_left</mat-icon>
            Anterior
          </button>
          <span class="page-info">Página {{ page }} de {{ totalPages }}</span>
          <button mat-stroked-button (click)="nextPage()" [disabled]="page >= totalPages || loading">
            Siguiente
            <mat-icon>chevron_right</mat-icon>
          </button>
        </div>
      }
    }
  </mat-card>
</div>
