<mat-toolbar color="primary" class="header-toolbar">
  <img src="https://digitalhub.fifa.com/transform/157d23bf-7e13-4d7b-949e-5d27d340987e/WC26_Logo?&io=transform:fill,height:210&quality=75" alt="FIFA Logo" class="logo">
  <span class="title">FIFA Predictor ⚽</span>
  <span class="spacer"></span>
  
  <nav class="menu-desktop">
    <button class="menu-button" mat-button routerLink="/">
      <mat-icon class="icon">home</mat-icon> Home
    </button>
    <button class="menu-button" mat-button routerLink="/tabla-puntajes">
      <mat-icon class="icon">leaderboard</mat-icon> Tabla de puntajes
    </button>
    <button class="menu-button" mat-button routerLink="/juegos">
      <mat-icon class="icon">sports_soccer</mat-icon> Juegos de la semana
    </button>

  <!-- Botón Equipos con submenú hover - Versión corregida -->
  <div 
    class="menu-button-container" 
    (mouseenter)="equiposMenuTrigger.openMenu()"
  >
    <button 
      class="menu-button" 
      mat-button 
      [matMenuTriggerFor]="equiposSubMenu"
      #equiposMenuTrigger="matMenuTrigger"
      routerLink="/equipos"
    >
      <mat-icon class="icon">groups</mat-icon> Equipos
      <mat-icon class="dropdown-icon">arrow_drop_down</mat-icon>
    </button>
    
    <mat-menu #equiposSubMenu="matMenu" class="submenu-hover">
      <div (mouseenter)="equiposMenuTrigger.openMenu()" (mouseleave)="equiposMenuTrigger.closeMenu()">
        <button mat-menu-item routerLink="/equipos">
          <mat-icon>sports</mat-icon> En competición
        </button>
        <button mat-menu-item routerLink="/fixture">
          <mat-icon>calendar_today</mat-icon> Fixture
        </button>
      </div>
    </mat-menu>
  </div>

    <button class="menu-button desktop-2" mat-button routerLink="/reglamento">
      <mat-icon class="icon">gavel</mat-icon> Reglamento
    </button>
    <button class="menu-button desktop-2" mat-button routerLink="/admin">
      <mat-icon class="icon">admin_panel_settings</mat-icon> Admin
    </button>
  </nav>

  <button mat-icon-button [matMenuTriggerFor]="menu" class="menu-mobile">
    <mat-icon>menu</mat-icon>
  </button>

  <!-- Menú móvil -->
  <mat-menu #menu="matMenu">
    <button class="mobile-2" mat-menu-item routerLink="/">
      <mat-icon>home</mat-icon>
      <span>Home</span>
    </button>
    <button class="mobile-2" mat-menu-item routerLink="/tabla-puntajes">
      <mat-icon>leaderboard</mat-icon>
      <span>Tabla de puntajes</span>
    </button>
    <button class="mobile-2" mat-menu-item routerLink="/juegos">
      <mat-icon>sports_soccer</mat-icon>
      <span>Juegos de la semana</span>
    </button>

    <!-- Submenú en móvil: se mantiene como clic tradicional -->
    <button mat-menu-item [matMenuTriggerFor]="equiposMobileSubMenu">
      <mat-icon>groups</mat-icon>
      <span>Equipos</span>
      <mat-icon>arrow_right</mat-icon>
    </button>
    <mat-menu #equiposMobileSubMenu="matMenu">
      <button mat-menu-item routerLink="/equipos">
        <mat-icon>sports</mat-icon>
        En competición
      </button>
      <button mat-menu-item routerLink="/fixture">
        <mat-icon>calendar_today</mat-icon>
        Fixture
      </button>
    </mat-menu>

    <button mat-menu-item routerLink="/reglamento">
      <mat-icon>gavel</mat-icon>
      <span>Reglamento</span>
    </button>
    <button mat-menu-item routerLink="/admin">
      <mat-icon>admin_panel_settings</mat-icon>
      <span>Admin</span>
    </button>
  </mat-menu>
</mat-toolbar>
