<div class="tabla-puntajes-container-dialog">
    <mat-card class="tabla-puntajes-card-dialog">
    <div class="header">
        <img src="https://digitalhub.fifa.com/transform/157d23bf-7e13-4d7b-949e-5d27d340987e/WC26_Logo?&io=transform:fill,height:210&quality=75" alt="FIFA Logo" class="logo">
        <mat-card-title class="tabla-puntajes-title">{{ data.nombre }}</mat-card-title>
        <button class="close-button" (click)="cerrar()">✕</button>
    </div>
    <mat-divider></mat-divider>
    
    <div class="table-container">
        <div class="tabla-puntajes-table">
        <div class="participante-section">
            <div class="participante">
            <span class="participante-item">Puntaje total</span>
            <span class="puntaje-item">{{ data.puntaje }} puntos</span>
            </div>
        </div>
        
        <div class="equipos-section">
            <div class="equipos-lista">            
            @if ((data.acumulado) !== 0) {
                <div class="equipo-item">
                <img
                    src="https://digitalhub.fifa.com/transform/157d23bf-7e13-4d7b-949e-5d27d340987e/WC26_Logo?&io=transform:fill,height:210&quality=75"
                    alt="FIFA"
                    class="equipo-logo"
                />
                <div class="equipo-info-derecha">
                    <strong class="equipo-nombre">Acumulado</strong>
                    <span class="equipo-puntaje">{{ data.acumulado }} puntos</span>
                    <div class="chip-grupo acumulado-chip">Acumulado</div>
                </div>
                </div>
            }
            @for (eq of data.equipos; track eq.nombre) {
                <div class="equipo-item">
                <img [src]="eq.logo" [alt]="eq.nombre" class="equipo-logo" />
                <div class="equipo-info-derecha">
                    <strong class="equipo-nombre">{{ eq.nombre }}</strong>
                    <span class="equipo-puntaje">{{ eq.pg * 10 + eq.pe * 5 }} puntos</span>
                    <span class="chip-grupo">GRUPO {{ eq.grupo }}</span>
                </div>
                </div>
            }
            </div>
        </div>
        </div>
    </div>
    </mat-card>
</div>
